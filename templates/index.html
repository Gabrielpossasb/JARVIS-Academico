<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS Acadêmico</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #07111f;
      color: #d8e8f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: #0b1a2e;
      border-bottom: 1px solid #1b3a6b;
      flex-shrink: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1255b8, #3ea8f5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      box-shadow: 0 0 18px rgba(62, 168, 245, 0.45);
      flex-shrink: 0;
    }

    .logo-pulse {
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 18px rgba(62, 168, 245, 0.45); }
      50%       { box-shadow: 0 0 30px rgba(62, 168, 245, 0.75); }
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      color: #5ec0f5;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 11px;
      color: #4a6b8a;
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #4caf50;
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 6px #4caf50;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #1b3a6b; border-radius: 4px; }

    /* ── Welcome card ── */
    .welcome-card {
      text-align: center;
      padding: 36px 20px;
      color: #3d6080;
    }

    .welcome-card .big-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1255b8, #3ea8f5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 16px;
      box-shadow: 0 0 30px rgba(62, 168, 245, 0.4);
    }

    .welcome-card h2 { font-size: 20px; color: #5ec0f5; margin-bottom: 6px; }
    .welcome-card p  { font-size: 13px; line-height: 1.6; }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 820px;
      width: 100%;
    }

    .msg-row.user   { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.jarvis { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-row.user   .avatar { background: linear-gradient(135deg, #1b5e20, #4caf50); color: #fff; }
    .msg-row.jarvis .avatar {
      background: linear-gradient(135deg, #1255b8, #3ea8f5);
      color: #fff;
      box-shadow: 0 0 10px rgba(62, 168, 245, 0.3);
    }

    .bubble {
      padding: 11px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 100%;
    }

    .msg-row.user .bubble {
      background: #102540;
      border: 1px solid #1b3a6b;
      border-bottom-right-radius: 4px;
    }

    .msg-row.jarvis .bubble {
      background: #0c1e33;
      border: 1px solid #162f52;
      border-bottom-left-radius: 4px;
    }

    /* Tool badge */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #071828;
      border: 1px solid #1255b8;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: #5ec0f5;
      margin-bottom: 8px;
    }

    .tool-badge svg { width: 11px; height: 11px; fill: #5ec0f5; }

    /* Inline code */
    .bubble code {
      background: #071828;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      color: #90caf9;
    }

    /* ── Thinking dots ── */
    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3ea8f5;
      animation: bounce 1.3s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.35; }
      40%            { transform: translateY(-7px); opacity: 1;    }
    }

    /* ── Input area ── */
    #input-area {
      flex-shrink: 0;
      padding: 14px 20px 18px;
      background: #0b1a2e;
      border-top: 1px solid #162f52;
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .q-btn {
      background: #071828;
      border: 1px solid #1b3a6b;
      color: #90caf9;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .q-btn:hover {
      background: #102540;
      border-color: #3ea8f5;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #0c1e33;
      border: 1px solid #1b3a6b;
      border-radius: 12px;
      color: #d8e8f8;
      padding: 11px 15px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #3ea8f5; }
    textarea::placeholder { color: #2e4f6e; }

    #send-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #1255b8, #3ea8f5);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    #send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(62, 168, 245, 0.45);
    }

    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="logo logo-pulse">J</div>
  <div class="header-text">
    <h1>JARVIS Acadêmico</h1>
    <p>Assistente Inteligente para Estudantes</p>
  </div>
  <div class="status-dot">Online</div>
</header>

<div id="chat">
  <div class="welcome-card">
    <div class="big-logo">J</div>
    <h2>Olá! Sou o JARVIS.</h2>
    <p>Posso ajudar com sua <strong style="color:#5ec0f5">agenda acadêmica</strong>,
    <strong style="color:#5ec0f5">lista de tarefas</strong> e
    <strong style="color:#5ec0f5">materiais de estudo</strong>.<br>
    Use os atalhos abaixo ou escreva sua pergunta.</p>
  </div>
</div>

<div id="input-area">
  <div class="quick-actions">
    <button class="q-btn" onclick="sendQuick('O que tenho hoje?')">📅 Agenda hoje</button>
    <button class="q-btn" onclick="sendQuick('Quais são minhas tarefas pendentes?')">✅ Tarefas</button>
    <button class="q-btn" onclick="sendQuick('Tenho provas essa semana?')">📝 Provas</button>
    <button class="q-btn" onclick="sendQuick('Explique o algoritmo KNN')">📚 KNN</button>
    <button class="q-btn" onclick="sendQuick('Explique árvores de decisão')">🌳 Árvores de decisão</button>
  </div>
  <div class="input-row">
    <textarea id="msg" placeholder="Pergunte algo ao JARVIS… (Enter para enviar, Shift+Enter para nova linha)" rows="1"></textarea>
    <button id="send-btn" onclick="send()" title="Enviar">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const msgEl   = document.getElementById('msg');
  const sendBtn = document.getElementById('send-btn');

  /* Auto-resize textarea */
  msgEl.addEventListener('input', () => {
    msgEl.style.height = 'auto';
    msgEl.style.height = Math.min(msgEl.scrollHeight, 130) + 'px';
  });

  msgEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  /* Tool labels in Portuguese */
  const toolLabels = {
    consultar_agenda:  '📅 Consultando agenda…',
    verificar_provas:  '📝 Verificando provas…',
    listar_tarefas:    '✅ Listando tarefas…',
    adicionar_tarefa:  '➕ Adicionando tarefa…',
    concluir_tarefa:   '✔ Concluindo tarefa…',
    buscar_material:   '📚 Buscando no material…',
  };

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function addUserMsg(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar">Eu</div>
      <div class="bubble">${escapeHtml(text)}</div>`;
    chat.appendChild(row);
    scrollBottom();
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row jarvis';
    row.innerHTML = `
      <div class="avatar">J</div>
      <div class="bubble">
        <div class="thinking">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
    chat.appendChild(row);
    scrollBottom();
    return row;
  }

  function addJarvisMsg(text, toolUsed) {
    const row = document.createElement('div');
    row.className = 'msg-row jarvis';

    let badgeHtml = '';
    if (toolUsed) {
      const label = toolLabels[toolUsed] || ('⚙ ' + toolUsed.replace(/_/g, ' '));
      badgeHtml = `<div class="tool-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.93V17a1 1 0 0 1-2 0v-.07A8.001 8.001 0 0 1 4.07 11H4a1 1 0 0 1 0-2h.07A8.001 8.001 0 0 1 11 4.07V4a1 1 0 0 1 2 0v.07A8.001 8.001 0 0 1 19.93 11H20a1 1 0 0 1 0 2h-.07A8.001 8.001 0 0 1 13 16.93z"/></svg>
        ${label}
      </div>`;
    }

    row.innerHTML = `
      <div class="avatar">J</div>
      <div class="bubble">${badgeHtml}${formatText(text)}</div>`;
    chat.appendChild(row);
    scrollBottom();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(raw) {
    let s = escapeHtml(raw);
    s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  async function send() {
    const text = msgEl.value.trim();
    if (!text || sendBtn.disabled) return;

    /* Remove welcome card on first message */
    const welcome = chat.querySelector('.welcome-card');
    if (welcome) welcome.remove();

    addUserMsg(text);
    msgEl.value = '';
    msgEl.style.height = 'auto';
    sendBtn.disabled = true;

    const thinking = addThinking();

    try {
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();
      thinking.remove();

      if (data.error) {
        addJarvisMsg('⚠ Erro: ' + data.error, null);
      } else {
        addJarvisMsg(data.response, data.tool_used);
      }
    } catch (_) {
      thinking.remove();
      addJarvisMsg('⚠ Não foi possível conectar ao servidor. Verifique se o JARVIS está rodando.', null);
    }

    sendBtn.disabled = false;
    msgEl.focus();
  }

  function sendQuick(text) {
    msgEl.value = text;
    send();
  }
</script>

</body>
</html>
